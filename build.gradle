plugins {
    id 'java'
    id 'idea'
    id 'application'
}

repositories {
    mavenCentral()
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation group: 'com.formdev', name: 'flatlaf', version: '0.39'
    implementation group: 'com.miglayout', name: 'miglayout-swing', version: '5.0'
}

version '2.2.2'
mainClassName = "editor.MainFrame"
applicationName = rootProject.name

compileJava.options.encoding = 'UTF-8'
compileTestJava.options.encoding = 'UTF-8'

jar {
    archiveFileName = "${rootProject.name}-${project.version}.jar"
    entryCompression = ZipEntryCompression.STORED
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    manifest {
        attributes "Main-Class": mainClassName
    }

    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

distZip {
    archiveFileName = "${rootProject.name}-${project.version}.zip"
}

distTar {
    archiveFileName = "${rootProject.name}-${project.version}.tar"
}
